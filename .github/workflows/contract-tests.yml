name: Contract tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -p "test_*_contract.py" -v
